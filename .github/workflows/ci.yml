name: FULL CI/CD workflow
on:
  push:
    branches:
      - develop
      - main
      - "ci/**"
      - "fix/**"
      - "chore/**"
  workflow_dispatch:

jobs:
  build-test-push:
    environment: dockerhub-username
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: cache layer
        uses: actions/cache@v4
        with:
          path: |
            api/node_modules
            worker/node_modules
          key: node-modules-${{ hashFiles('api/package-lock.json', 'worker/package-lock.json') }}

      - name: install dependencies
        run: |
          cd api && npm install
          cd ../worker && npm install

      - name: syntax check
        run: |
          echo "Checking syntax..."
          node --check api/index.js
          node --check worker/index.js

      - name: run tests
        run: |
          echo "Running tests..."
          cd api && npm test

      - name: getting output of version bump
        id: get_version
        run: echo "version=$(node -p 'require("./api/package.json").version')" >> $GITHUB_OUTPUT

      - name: automated version bump
        id: bump_version
        if: github.ref == 'refs/heads/develop'
        uses: "phips28/gh-action-bump-version@master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGEJSON_DIR: api

      - name: setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: build and push Docker image (api)
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REPO }}:api-${{ steps.bump_version.outputs.newTag || steps.get_version.outputs.version }}

      - name: build and push docker image (worker)
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REPO }}:worker-${{ steps.bump_version.outputs.newTag || steps.get_version.outputs.version }}

      - name: build and push docker image (nginx)
        uses: docker/build-push-action@v6
        with:
          context: nginx
          file: nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REPO }}:nginx-${{ steps.bump_version.outputs.newTag  || steps.get_version.outputs.version }}

      - name: build and push docker image (postgres)
        uses: docker/build-push-action@v6
        with:
          context: db
          file: db/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REPO }}:postgres-${{ steps.bump_version.outputs.newTag || steps.get_version.outputs.version }}

  deploy:
    needs: build-test-push
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: deploy to production
        run: |
          echo " will be implemented in the future, using kubectl or helm to deploy to a Kubernetes cluster"
